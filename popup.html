<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Summarizer</title>
  <script src="lib/marked.min.js"></script>
  <script src="lib/katex.min.js"></script>
  <script src="lib/purify.min.js"></script>
  <link rel="stylesheet" href="lib/katex.min.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f3;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-strong: #ffffff;
      --ink: #152114;
      --muted: #61705f;
      --line: rgba(21, 33, 20, 0.1);
      --accent: #14614e;
      --accent-strong: #104d3f;
      --accent-soft: rgba(20, 97, 78, 0.1);
      --danger: #a9382f;
      --shadow: 0 14px 36px rgba(21, 33, 20, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 408px;
      height: 520px;
      margin: 0;
      padding: 14px;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(100, 164, 138, 0.18), transparent 30%),
        linear-gradient(180deg, #f8faf7 0%, #eef3ee 100%);
    }

    .shell {
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100%;
    }

    .topbar,
    .controls,
    .summary-panel,
    .status {
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
    }

    .title-wrap {
      min-width: 0;
    }

    .title {
      margin: 0;
      font-size: 16px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .meta-line {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .settings-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .controls {
      padding: 12px;
    }

    .controls-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .provider-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }

    .provider-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .mode-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .mode-row::-webkit-scrollbar {
      display: none;
    }

    .mode-chip,
    .summarize-btn,
    .settings-btn {
      font: inherit;
    }

    .mode-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      padding: 9px 12px;
      white-space: nowrap;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
    }

    .mode-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .mode-chip strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
    }

    .mode-chip span {
      display: block;
      font-size: 11px;
      opacity: 0.9;
      margin-top: 2px;
    }

    .summarize-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 13px 16px;
      background: linear-gradient(135deg, var(--accent) 0%, #1b7d67 100%);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .summarize-btn:hover:enabled {
      transform: translateY(-1px);
    }

    .summarize-btn:disabled {
      opacity: 0.6;
      cursor: progress;
    }

    .status {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.45;
      border: 1px solid transparent;
    }

    .status.visible {
      display: flex;
    }

    .status.info {
      background: rgba(20, 97, 78, 0.08);
      color: var(--accent);
      border-color: rgba(20, 97, 78, 0.14);
    }

    .status.success {
      background: rgba(28, 111, 73, 0.1);
      color: #206c47;
      border-color: rgba(28, 111, 73, 0.14);
    }

    .status.error {
      background: rgba(169, 56, 47, 0.1);
      color: var(--danger);
      border-color: rgba(169, 56, 47, 0.14);
    }

    .loader {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(20, 97, 78, 0.18);
      border-top-color: currentColor;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .summary-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
      overflow: hidden;
    }

    .summary-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
    }

    .summary-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
    }

    .summary-meta {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    #summary {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      font-size: 14px;
      line-height: 1.58;
    }

    .summary-placeholder {
      color: var(--muted);
    }

    #summary h1,
    #summary h2,
    #summary h3 {
      margin: 0 0 10px;
      line-height: 1.25;
    }

    #summary h1 {
      font-size: 17px;
    }

    #summary h2 {
      font-size: 15px;
    }

    #summary h3 {
      font-size: 14px;
    }

    #summary p,
    #summary ul,
    #summary ol,
    #summary blockquote,
    #summary pre,
    #summary table {
      margin: 0 0 12px;
    }

    #summary ul,
    #summary ol {
      padding-left: 20px;
    }

    #summary code,
    #summary pre {
      font-family: "SFMono-Regular", "Menlo", monospace;
      background: #f3f5f1;
      border-radius: 10px;
    }

    #summary code {
      padding: 2px 6px;
      font-size: 12px;
    }

    #summary pre {
      padding: 12px;
      overflow-x: auto;
    }

    #summary blockquote {
      padding-left: 12px;
      border-left: 3px solid rgba(20, 97, 78, 0.2);
      color: #3b4a39;
    }

    #summary table {
      width: 100%;
      border-collapse: collapse;
    }

    #summary th,
    #summary td {
      padding: 8px;
      border: 1px solid rgba(21, 33, 20, 0.1);
      text-align: left;
    }

    button:focus-visible {
      outline: 2px solid rgba(20, 97, 78, 0.3);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="title-wrap">
        <h1 class="title">Article Summarizer</h1>
        <div class="meta-line">
          <span id="providerChipLabel">OpenAI</span>
          <span> · </span>
          <span id="currentModel">Loading...</span>
        </div>
      </div>
      <button id="optionsLink" class="settings-btn" type="button" aria-label="Open settings">Set</button>
    </header>

    <section class="controls">
      <div class="controls-head">
        <div id="providerChip" class="provider-pill">
          <span class="provider-dot"></span>
          <span id="providerEndpoint">api.openai.com</span>
        </div>
        <div class="hint">1 click to summarize</div>
      </div>

      <div id="summaryModeRow" class="mode-row" aria-label="Summary mode"></div>

      <button id="summarizeBtn" class="summarize-btn" type="button">Summarize current page</button>
    </section>

    <div id="status" class="status info" role="status" aria-live="polite">
      <span id="statusIcon" class="loader" aria-hidden="true"></span>
      <span id="statusMessage">Preparing article extraction...</span>
    </div>

    <section class="summary-panel">
      <div class="summary-head">
        <h2 class="summary-title">Summary</h2>
        <span id="wordCount" class="summary-meta">Ready</span>
      </div>
      <div id="summary">
        <div class="summary-placeholder">Choose a mode if needed, then summarize. The result stays in view without scrolling past setup text.</div>
      </div>
    </section>
  </div>

  <script type="module" src="js/popup.js"></script>
</body>
</html>
